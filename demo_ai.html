<!DOCTYPE html>
<html lang="zh_TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #f8fbfb;
            /* 淺色背景，較柔和 */
            font-family: "Microsoft JhengHei", sans-serif;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            /* 適中的標題大小 */
            color: #1a535c;
            /* 深青色，專業感 */
            margin-bottom: 50px;
            letter-spacing: 2px;
            border-bottom: 3px solid #4ecdc4;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
        }

        td {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        td:hover {
            background-color: #f0fdfa;
        }

        .column1 {
            width: 25%;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            color: #1a535c;
        }

        .column1 img {
            width: 100px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .column2 {
            width: 55%;
            color: #555;
            text-align: justify;
            font-size: 1rem;
            padding: 25px;
        }

        .column2::first-letter {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ecdc4;
        }

        .column3 {
            width: 20%;
            color: #ff6b6b;
            /* 醒目的價格紅 */
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
        }

        del {
            display: block;
            color: #bbb;
            font-size: 0.9rem;
            font-weight: normal;
        }

        .lastrow {
            background-color: #1a535c;
            color: white !important;
            font-size: 1rem;
            text-align: center;
            height: auto;
            padding: 15px;
        }

        /* 表單部分 */
        form {
            margin-top: 50px;
            width: 100%;
            max-width: 600px;
        }

        fieldset {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px;
            background: white;
        }

        legend {
            padding: 0 15px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1a535c;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-left: 0;
        }

        .form label {
            font-size: 1.1rem;
        }

        input[type="text"],
        input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: #4ecdc4;
            background-color: #fff;
        }

        input[type="radio"] {
            margin: 0 10px 0 5px;
            transform: scale(1.2);
        }

        input[type="submit"] {
            margin-top: 20px;
            padding: 15px;
            background-color: #4ecdc4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        input[type="submit"]:hover {
            background-color: #1a535c;
        }

        input[type="submit"]:active {
            transform: scale(0.98);
        }

        /* 隱藏原始 HTML 中的多餘換行，由 CSS 間距控制 */
        br {
            display: none;
        }
    </style>
</head>

<body>

    <div>
        <h1>骨往筋來整復養生中心</h1>
    </div>

    <br>
    <br>
    <br>

    <table>
        <tr>
            <td class="column1"><img src="./images/A.png"><br>A方案</td>
            <td class="column2">深層鬆筋解除硬梆梆！半身整復舒緩推拿30分(純手技)〈專業說明 + 全身肌肉放鬆 + 上半身(頭肩頸+上背+手臂) / 下半身(腰+臀+大腿+小腿) 二選一 +
                純手技筋膜推拿〉</td>
            <td class="column3"><del>$780</del>$488</td>
        </tr>
        <tr>
            <td class="column1"><img src="./images/B.png"><br>B方案</td>
            <td class="column2">痠痛僵硬專科！全身整復舒緩推拿60分(純手技)〈專業說明 + 全身肌肉放鬆 + 骨架平衡調整 + 純手技筋膜調理 + 紅豆熱敷毯釋壓 + 養生熱薑茶〉</td>
            <td class="column3"><del>$1380</del>$798</td>
        </tr>
        <tr>
            <td colspan="3" class="lastrow">地址：105臺北市松山區中正里復興北路179號7樓之三</td>
        </tr>
    </table>

    <br>
    <br>
    <br>

    <form>
        <fieldset>
            <div class="form">
                <legend>我要預約</legend>
                <lable name="name">稱呼：</lable>
                <input type="text" name="name"><br>
                <lable name="phonenumber">聯絡方式：</lable>
                <input type="tel" name="phonenumber"><br>
                <lable name="type">選擇方案：</lable>
                <lable for="A">方案A</lable><input type="radio" name="type" id="A" value="A">
                <lable for="B">方案B</lable><input type="radio" name="type" id="B" value="B"><br>
                <input type="submit" name="submit" value="立即預約">
            </div>
        </fieldset>
    </form>

    <br>
    <br>
    <br>
    <br>
    <br>

</body>

</html>
