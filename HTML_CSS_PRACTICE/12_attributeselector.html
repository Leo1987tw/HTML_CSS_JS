<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屬性選擇器 - 我的網站</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* 範例展示區域 */
        .demo-area {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: left;
        }

        .demo-title {
            color: #5a67d8;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #e8eaf6;
            padding-bottom: 10px;
        }

        /* 屬性選擇器實作範例 */
        div[class*="box"] {
            width: 100%;
            height: 60px;
            margin-bottom: 15px;
            background-color: #c7d2fe;
            /* 預設紫色系（對應主頁） */
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #4c51bf;
            transition: 0.3s;
        }

        /* 屬性選擇器：以 1 結尾的變成粉紅色 */
        div[class$="1"] {
            background-color: #fbb6ce;
            color: #b83280;
        }

        /* 屬性選擇器：包含 2 的加個邊框 */
        div[class*="2"] {
            border: 3px solid #5a67d8;
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="./index.html" class="back-link">← 返回首頁</a>

        <h1>屬性選擇器</h1>

        <p>
            用法：<code>選擇器[屬性="值"]</code><br>
            <code>^=</code> 開頭 | <code>$=</code> 結尾 | <code>*=</code> 包含字串<br>
            <code>~=</code> 包含單字 | <code>|=</code> 連字號開頭
        </p>

        <div class="demo-area">
            <div class="demo-title">實作效果展示：</div>

            <div class="box1">box1 (套用了 [class$="1"])</div>
            <div class="box2">box2 (套用了 [class*="2"])</div>
            <div class="box3">box3 (僅套用 [class*="box"])</div>
        </div>
    </div>

</body>

</html>
