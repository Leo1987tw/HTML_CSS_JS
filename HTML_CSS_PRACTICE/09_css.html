<!DOCTYPE html>
<html lang="zh_TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS範例</title>
    <!-- 外部樣式，優先順序最低 -->
    <link rel="stylesheet" href="./out_css_style.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* 💡 統一風格新增部分：讓展示區塊像首頁一樣顯眼 */
        .outercss,
        div.css,
        [style*="color: pink"] {
            background: white;
            color: #667eea;
            margin: 10px auto;
            padding: 20px;
            width: 350px;
            border-radius: 15px;
            font-size: 1.5em;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* 內部標頭樣式，優先順序次高 */
        div.css {
            color: #764ba2;
            /* 使用紫色調區隔 */
        }
    </style>
</head>

<body>

    <div>
        <div class="container">
            <a href="./index.html" class="back-link">← 返回首頁</a>
        </div>

        <h1>CSS範例</h1>

        <p>這是CSS範例。</p>

        <div class="outercss">
            outerstyle 語法:<br>&lt;link rel="stylesheet" href="./style.css"&gt;
        </div>
        <div class="css">
            innerstyle 語法:<br>div.css {<br>&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbspocolor:
            #764ba2;<br>}
        </div>
        <!-- 內部樣式，優先順序最高 -->
        <div style="color: pink;">
            inlinecss 語法:<br>style="color: pink;"
        </div>

</body>

</html>
