<!DOCTYPE html>
<html lang="zh_TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內嵌框架範例</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        iframe {
            width: 300px;
            height: 300px;
            border: none;
        }

        form {
            margin: auto;
            text-align: center;
        }
    </style>
</head>

<body>

    <div>
        <div class="container">
            <a href="./index.html" class="back-link">← 返回首頁</a>
        </div>

        <h1>內嵌框架範例</h1>

        <p>這是內嵌框架範例。</p>


        <table>
            <tr>
                <td width="400px">
                    <iframe src="./pages/starbucks.html" frameborder="0"></iframe>
                </td>
                <td></td>
            </tr>
        </table>

        <br>
        <br>
        <br>

        <table>
            <tr>
                <td width="400px"></td>
                <td>
                    <iframe src="./pages/pink.html" frameborder="0"></iframe>
                </td>
            </tr>
        </table>

        <br>
        <br>
        <br>

        <form id="searchForm">
            <input type="text" name="wordInput" id="wordInput" placeholder="輸入單字，例如: book">
            <input type="submit" value="search">
        </form>

        <br>
        <br>
        <br>

        <table>
            <tr>
                <td width="400px">
                    <iframe id="dictFrame1" src="https://www.merriam-webster.com/dictionary/apple"
                        frameborder="0"></iframe>
                </td>
                <td></td>
            </tr>
        </table>

        <br>
        <br>
        <br>

        <table>
            <tr>
                <td width="400px"></td>
                <td>
                    <iframe id="dictFrame2" src="https://zh.wiktionary.org/wiki/apple" frameborder="0"></iframe>
                </td>
            </tr>
        </table>

        <br>
        <br>
        <br>
        <br>
        <br>
    </div>

    <script>
        // 抓取 HTML 元素
        const searchForm = document.getElementById('searchForm');
        const wordInput = document.getElementById('wordInput');
        const dictFrame1 = document.getElementById('dictFrame1');
        const dictFrame2 = document.getElementById('dictFrame2');

        // 監聽表單提交事件
        searchForm.addEventListener('submit', function (event) {
            // 阻止表單預設的跳轉行為
            event.preventDefault();

            // 取得使用者輸入的內容
            const word = wordInput.value.trim();

            if (word !== "") {
                // 修改第一個 iframe 的 src (Merriam-Webster)
                dictFrame1.src = `https://www.merriam-webster.com/dictionary/${word}`;

                // 修改第二個 iframe 的 src (Wiktionary)
                dictFrame2.src = `https://zh.wiktionary.org/wiki/${word}`;
            } else {
                alert("請輸入單字！");
            }
        });
    </script>

</body>

</html>
