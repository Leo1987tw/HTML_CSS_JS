<!DOCTYPE html>
<html lang="zh_TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: auto;
            font-family: 'Courier New', Courier, monospace;
        }
        
        h1 {
            font-size: 600%;
            margin: 10vh auto;
        }

        table , td{
            border: 1px solid black;
            text-align: center;
        }

        table {
            width: 80vw;
        }

        td:hover {
            background-color: lightcyan;
        }

        .column1 {
            width: 30vw;
            font-size: 300%;
        }

        .column2 {
            color: blue;
            padding: 3%;
            width: 40vw;
            text-align: justify;
            font-size: 160%;
        }

        .column2::first-letter {
            font-size: 300%;
        }

        .column3 {
            color: red;
            width: 20vw;
            font-size: 400%;
        }

        .lastrow {
            height: 10vh;
            color: green;
            font-size: 200%;
        }

        img {
            width: 80%;
        }

        del {
            color: black;
            font-size: 60%;
        }

        .form {
            margin-left: 10%;
        }

        fieldset {
            width: 60vw;
            height: 50vh;
            font-size: 300%;
            text-align: left;
        }

        legend {
            text-align: left;
            margin-left: 10%;
            font-size: 150%;
        }

        input[type="text"] {
            width: 20vw;
            height: 5vh;
        }

        input[type="text"]:hover {
            background-color: lightblue;
        }

        input[type="tel"] {
            width: 30vw;
            height: 5vh;
        }

        input[type="tel"]:hover {
            background-color: lightblue;
        }

        input[type="submit"] {
            font-size: 100%;
        }
    </style>
</head>
<body>

    <div>
        <h1>骨往筋來整復養生中心</h1>
    </div>

    <br>
    <br>
    <br>

    <table>
        <tr>
            <td class="column1"><img src="./images/A.png"><br>A方案</td>
            <td class="column2">深層鬆筋解除硬梆梆！半身整復舒緩推拿30分(純手技)〈專業說明 + 全身肌肉放鬆 + 上半身(頭肩頸+上背+手臂) / 下半身(腰+臀+大腿+小腿) 二選一 + 純手技筋膜推拿〉</td>
            <td class="column3"><del>$780</del>$488</td>
        </tr>
        <tr>
            <td class="column1"><img src="./images/B.png"><br>B方案</td>
            <td class="column2">痠痛僵硬專科！全身整復舒緩推拿60分(純手技)〈專業說明 + 全身肌肉放鬆 + 骨架平衡調整 + 純手技筋膜調理 + 紅豆熱敷毯釋壓 + 養生熱薑茶〉</td>
            <td class="column3"><del>$1380</del>$798</td>
        </tr>
        <tr>
            <td colspan="3" class="lastrow">地址：105臺北市松山區中正里復興北路179號7樓之三</td>
        </tr>
    </table>

    <br>
    <br>
    <br>

    <form>
        <fieldset>
            <div class="form">
                <legend>我要預約</legend>
                <lable name="name">稱呼：</lable>
                <input type="text" name="name"><br>
                <lable name="phonenumber">聯絡方式：</lable>
                <input type="tel" name="phonenumber"><br>
                <lable name="type">選擇方案：</lable>
                <lable for="A">方案A</lable><input type="radio" name="type" id="A" value="A">
                <lable for="B">方案B</lable><input type="radio" name="type" id="B" value="B"><br>
                <input type="submit" name="submit" value="立即預約">
            </div>
        </fieldset>
    </form>

    <br>
    <br>
    <br>
    <br>
    <br>
    
</body>
</html>
