<!DOCTYPE html>
<html lang="zh_TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格式範例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: rgb(228, 224, 20);
            font-size: 2em;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        p {
            color: rgb(209, 126, 172);
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 30%;
            margin: 20px auto;
            border-collapse: collapse;
            text-align: center;
            background: #e8eaf6;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid #5a67d8;
        }

        th {
            padding: 15px;
            text-align: center;
            font-size: 1.5em;
            background: #5a67d8;
            color: white;
            border: 1px solid #4c51bf;
        }

        td {
            padding: 15px;
            text-align: center;
            font-size: 1.5em;
            border: 1px solid #c7d2fe;
        }

        a:link {
            font-size: 2em;
            color: red;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            padding: 12px 25px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .back-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        </style>
</head>

<body>
    <div>
        <div style="text-align: center;">
            <a href="./index.html" class="back-link">← 返回首頁</a>
        </div>

        <h1>連結範例</h1>

        <p>這是連結範例</p>

        <table>
            <tr>
                <td>按鈕在文字上</td>
                <td>
                    <!-- 相對路徑 -->
                    <img src="./images/starbucks.png" alt="starbucks">
                    <a href="./pages/starbucks.html">星巴克</a>
                </td>
            </tr>
            <tr>
                <td>按鈕在圖片上</td>
                <td>
                    <a href="./pages/starbucks.html">
                        <img src="./images/starbucks.png" alt="starbucks">
                    </a>
                </td>
            </tr>
        </table>
    </div>

</body>

</html>
