<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進出場動畫</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .output {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box,
        .input {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.5;
            letter-spacing: 0.08em;
        }

        .box {
            width: 300px;
            height: 300px;
            margin: 10px;
        }

        .fade {
            background-color: green;
        }

        .slide {
            background-color: blue;
        }

        .input {
            width: 300px;
            height: 300px;
            margin: auto;
            background-color: yellow;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <a href="./index.html" class="back-link">返回首頁</a>
        </div>

        <h1>進出場動畫</h1>
        <p>fade 淡入淡出 slide滑入滑出</p>

        <div class="input"></div>

        <div class="output">
            <div class="box fade"></div>
            <div class="box slide"></div>
        </div>
    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <script>
        $(function(){
            const input = $('.input');
            const fade = $('.fade');
            const slide = $('.slide');

            console.log('input', input);
            console.log('fade', fade);
            console.log('slide', slide);

            input.click(function(){
                console.log('click hide ok');

                // fade.fadeOut();
                // slide.slideUp();
                fade.fadeToggle();
                slide.slideToggle();
            });
        });
    </script>
</body>
</html>
