<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>複利計算</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .box {
            width: min(380px, 100%);
            margin: 0 auto 22px;
            padding: 22px;
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.94), rgba(30, 41, 59, 0.92));
            border-radius: 24px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 18px 40px rgba(15, 23, 42, 0.35);
        }

        .box form {
            display: grid;
            gap: 12px;
        }

        .box .one,
        .box .two,
        .box .three,
        .box .btn {
            width: 100%;
        }

        .box .one,
        .box .two,
        .box .three {
            text-align: center;
        }

        .box .btn {
            min-height: 56px;
            border-radius: 16px;
        }

        .output {
            width: min(380px, 100%);
            min-height: 68px;
            margin: 0 auto;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.72);
            color: #f8fafc;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 18px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 12px 24px rgba(15, 23, 42, 0.22);
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <a href="./index.html" class="back-link">返回首頁</a>
        </div>

        <h1>複利計算</h1>
        <p>jquery 實作複利計算</p>

        <a href="./pages/practice_jquery2.html">小試身手</a>

        <div class="box">
            <form action="">
                <input type="text" class="one" placeholder="本金">
                <input type="text" class="two" placeholder="年利率">
                <input type="text" class="three" placeholder="投資年份">
                <button class="btn">計算</button>
            </form>
        </div>

        <div class="output"></div>
    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <script>
        $(function(){
            const one = $('.one');
            const two = $('.two');
            const three = $('.three');
            const btn = $('.btn');
            const output = $('.output');

            console.log('one', one);
            console.log('two', two);
            console.log('three', three);
            console.log('btn', btn);
            console.log('output', output);

            btn.click(function(event){
                console.log('event', event);
                event.preventDefault(); //如果用form 表單 可以禁止其送出
                console.log('btn click ok', btn);
                
                let num1 = Number(one.val());
                let num2 = Number(two.val());
                let num3 = Number(three.val());

                console.log('num1', num1);
                console.log('typeof num1', typeof (num1));
                console.log('num2', num2);
                console.log('typeof num2', typeof (num2));
                console.log('num3', num3);
                console.log('typeof num3', typeof (num3));

                let result = 0;
                result = num1 * ((1 + num2 / 100) ** num3);
                result = Math.round(result);

                console.log('result', result);

                output.text(`本金${num1}，利息${num2}%，${num3}年，總共${result}`);
            });
        });
    </script>
</body>
</html>
