<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計算機</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .box {
            width: min(420px, 100%);
            margin: 0 auto 18px;
            padding: 24px;
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.94), rgba(15, 23, 42, 0.92));
            border-radius: 22px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 18px 38px rgba(15, 23, 42, 0.32);
        }

        .box form {
            display: grid;
            gap: 12px;
        }

        .one,
        .two,
        .opt {
            width: 100%;
            padding: 14px 16px;
            text-align: center;
            color: #eef2ff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
        }

        .opt {
            appearance: none;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            min-height: 56px;
            border-radius: 14px;
            font-size: 1rem;
        }

        .output {
            width: min(420px, 100%);
            min-height: 76px;
            margin: 0 auto;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.78);
            color: #f8fafc;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 12px 24px rgba(15, 23, 42, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <a href="./index.html" class="back-link">返回首頁</a>
        </div>

        <h1>計算機</h1>
        <p>jquery 計算機</p>

        <div class="box">
            <form action="">
                <!-- <input type="text" class="one" placeholder="key in the first number">
                <input type="text" class="two" placeholder="key in the second number">
                <input type="text" class="opt" placeholder="key in a operator(ex: +, -, *, /, %, ^)"> -->
                <input type="number" class="one" placeholder="key in the first number">
                <input type="number" class="two" placeholder="key in the second number">
                 <select class="opt">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                    <option value="^">^</option>
                 </select>
                <button class="btn">計算</button>
            </form>
        </div>

        <div class="output"></div>
    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <script>
        $(function(){
            const one = $('.one');
            const two = $('.two');
            const opt = $('.opt');
            const btn = $('.btn');
            const output = $('.output');

            console.log('one', one);
            console.log('two', two);
            console.log('opt', opt);
            console.log('btn', btn);
            console.log('output', output);

            btn.click(function(event){
                console.log('event', event);
                event.preventDefault(); //如果用form 表單 可以禁止其送出
                console.log('btn click ok', btn);
                
                let num1 = Number(one.val());
                let num2 = Number(two.val());
                let operator = opt.val();

                console.log('num1', num1);
                console.log('typeof num1', typeof (num1));
                console.log('num2', num2);
                console.log('typeof num2', typeof (num2));
                console.log('operator', operator);
                console.log('typeof operator', typeof (operator));

                let result = 0;
                switch(operator){
                    case '+':
                        result = num1 + num2;
                        break;
                    case '-':
                        result = num1 - num2;
                        break;
                    case '*':
                        result = num1 * num2;
                        break;
                    case '/':
                        result = num1 / num2;
                        break;
                    case '%':
                        result = num1 % num2;
                        break;
                    case '^':
                        result = num1 ** num2;
                        break;
                    default:
                        alert('wrong input');
                        location.reload();
                        return false;
                }

                console.log('result', result);

                output.text(result);
            });
        });
    </script>
</body>
</html>
